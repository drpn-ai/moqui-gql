# =============================================================================
# moqui-gql — GraphQL Schema (SDL), initial scope
#
# Field/type names are the Maarg OMS data model (orderId, orderDate, statusId,
# grandTotal, orderItems, ...). The query LANGUAGE is
# Shopify-shaped: `query:` search string, sortKey + reverse, Relay cursor
# connections, custom scalars. Read-only. DB-backed (Q1). Raw entity ids — no
# global IDs / Node (D-B). Analytics deferred (Q2).
#
# CONNECTION-vs-LIST rule (decision G1, hybrid by size): collections you would
# page are Relay connections (root lists; order line items; ship groups;
# shipments; returns; return items; picklist items; cycle-count items; products;
# parties). Small fixed metadata are plain bounded lists (statuses, adjustments,
# identifications, paymentPreferences, packages, addresses, variants, routing
# rules/runs, receipts). Every `first:` is capped at maxFirst (=100); nested
# defaults are <= the cap.
#
# This SDL is the CONTRACT the test catalog (examples.md) exercises (plan Task 7
# asserts the built SDL >= this; Task 14 runs the catalog as tests). Generated
# from per-deployment schema artifacts; entity wiring differs per install.
#
# The currently-BUILT surface is the subset in graphql/OmsSchema.gql.xml (see
# STATUS.md); types/roots/fields below that are not in that artifact — picklists,
# transfer/purchase orders, productStore, cycle counts, routing, BOPIS/ATP
# convenience roots, PostalAddress, and the customerName/fulfillmentStatus/
# orderCount service fields — are design surface, NOT yet implemented.
# =============================================================================

# --- Custom scalars ----------------------------------------------------------
"ISO-8601 timestamp, e.g. 2026-05-14T09:32:00Z."
scalar DateTime
"Arbitrary-precision decimal serialized as a string, e.g. \"129.00\". ALL Decimal values (money AND quantities) serialize as strings."
scalar Decimal

# --- Directives (governance / declare-and-control, Q3) -----------------------
"""
Declares the search keys accepted in this connection's `query:` string (Shopify
search syntax). Comparators per key: `:` (eq), `:a,b` (in), and for date/number
keys `:>` `:>=` `:<` `:<=`. Only declared keys are honored; unknown key ->
FIELD_NOT_FILTERABLE, disallowed comparator -> OPERATOR_NOT_ALLOWED. The same
keys+comparators are ALSO restated in each connection field's description so
they are visible via standard introspection (custom directives are not).
"""
directive @search(keys: [String!]!) on FIELD_DEFINITION
"Static cost weight hint for the analyzer (service-backed fields are high/opaque)."
directive @cost(weight: Int!) on FIELD_DEFINITION
"Marks a field whose value is produced by a Moqui service, not a column (decision 12). Auto-assigned serviceFixedCost unless @cost overrides."
directive @service(name: String!) on FIELD_DEFINITION

# --- Relay pagination --------------------------------------------------------
"Relay PageInfo (full)."
type PageInfo { hasNextPage: Boolean!  hasPreviousPage: Boolean!  startCursor: String  endCursor: String }

# =============================================================================
# Query root
# =============================================================================
type Query {
  # ---- Order ----
  order(orderId: ID, externalId: String): Order
  orderByIdentification(identificationTypeId: String!, idValue: String!): Order
  "List orders. `query:` keys: orderId(eq,in) externalId(eq,in) orderName(eq) statusId(eq,in) orderDate(>,>=,<,<=) customerPartyId(eq,in) productStoreId(eq,in)."
  orders(query: String, sortKey: OrderSortKey = ORDER_DATE, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): OrderConnection!
    @search(keys: ["orderId","externalId","orderName","statusId","orderDate","customerPartyId","productStoreId"])

  # ---- Fulfillment ----
  shipment(shipmentId: ID, externalId: String): Shipment
  "List shipments. `query:` keys: shipmentId(eq,in) statusId(eq,in) originFacilityId(eq,in) shipmentMethodTypeId(eq,in) shippedDate(>,>=,<,<=)."
  shipments(query: String, sortKey: ShipmentSortKey = SHIPPED_DATE, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): ShipmentConnection!
    @search(keys: ["shipmentId","statusId","originFacilityId","shipmentMethodTypeId","shippedDate"])
  picklist(picklistId: ID!): Picklist
  "BOPIS pickup orders for a facility. `query:` keys: facilityId(eq,in) statusId(eq,in) orderDate(>,>=,<,<=)."
  pickupOrders(query: String, sortKey: OrderSortKey = ORDER_DATE, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): OrderConnection!
    @search(keys: ["facilityId","statusId","orderDate"]) @cost(weight: 5)
  "Ready-to-pick warehouse queue (deployment-specific keys, e.g. Gorjana adds brandName/isGift)."
  readyToPickOrders(query: String, sortKey: OrderSortKey = ORDER_DATE, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): ReadyToPickOrderConnection!
    @search(keys: ["facilityId","statusId","shipmentMethodTypeId"]) @cost(weight: 5)

  # ---- Returns ----
  return(returnId: ID, externalId: String): Return
  "List returns. `query:` keys: returnId(eq,in) statusId(eq,in) orderId(eq,in) returnDate(>,>=,<,<=)."
  returns(query: String, sortKey: ReturnSortKey = RETURN_DATE, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): ReturnConnection!
    @search(keys: ["returnId","statusId","orderId","returnDate"])

  # ---- Transfers & purchasing ----
  "List transfer orders. `query:` keys: orderId(eq,in) statusId(eq,in) facilityId(eq,in)."
  transferOrders(query: String, sortKey: OrderSortKey = ORDER_DATE, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): TransferOrderConnection!
    @search(keys: ["orderId","statusId","facilityId"])
  purchaseOrder(orderId: ID!): PurchaseOrder

  # ---- Catalog ----
  product(productId: ID, externalId: String): Product
  "List products. `query:` keys: productId(eq,in) productName(eq) primaryProductCategoryId(eq,in) productTypeId(eq,in)."
  products(query: String, sortKey: ProductSortKey = PRODUCT_NAME, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): ProductConnection!
    @search(keys: ["productId","productName","primaryProductCategoryId","productTypeId"])

  # ---- Facility & store ----
  facility(facilityId: ID, externalId: String): Facility
  "List facilities. `query:` keys: facilityId(eq,in) facilityTypeId(eq,in) externalId(eq,in) parentFacilityId(eq,in)."
  facilities(query: String, sortKey: FacilitySortKey = FACILITY_NAME, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): FacilityConnection!
    @search(keys: ["facilityId","facilityTypeId","externalId","parentFacilityId"])
  productStore(productStoreId: ID!): ProductStore

  # ---- Party / customer (R2) ----
  party(partyId: ID, externalId: String): Party
  "Find parties/customers. `query:` keys: partyId(eq,in) externalId(eq,in) firstName(eq) lastName(eq) emailAddress(eq) roleTypeId(eq,in)."
  parties(query: String, sortKey: PartySortKey = PARTY_ID, reverse: Boolean = false,
    first: Int, after: String, last: Int, before: String): PartyConnection!
    @search(keys: ["partyId","externalId","firstName","lastName","emailAddress","roleTypeId"])

  # ---- Inventory / ATP (service-backed) ----
  checkBopisInventory(facilityId: ID!, productId: ID!, quantity: Int!): InventoryCheck @service(name: "get#BopisInventory") @cost(weight: 25)
  productOnlineAtp(productId: ID!, productStoreId: ID!): AtpResult @service(name: "get#ProductOnlineAtp") @cost(weight: 25)
  facilityInventory(facilityId: ID!, productId: ID!): InventoryLevel @cost(weight: 10)
  "Bulk ATP/on-hand for many products across facilities (R3). Capped at maxInventoryKeys product*facility pairs."
  inventoryLevels(productIds: [ID!]!, facilityIds: [ID!]): [InventoryLevel!]! @service(name: "get#InventoryLevels") @cost(weight: 25)

  # ---- Inventory count & routing ----
  cycleCount(inventoryCountImportId: ID!): CycleCount
  orderRoutingGroup(routingGroupId: ID!): OrderRoutingGroup
}

# =============================================================================
# Sort-key enums (values are OUR fields; no RELEVANCE — DB-backed, no full-text)
# =============================================================================
enum OrderSortKey { ORDER_DATE ORDER_NAME GRAND_TOTAL ORDER_ID }
enum ShipmentSortKey { SHIPPED_DATE STATUS SHIPMENT_ID }
enum ReturnSortKey { RETURN_DATE RETURN_ID STATUS }
enum ProductSortKey { PRODUCT_NAME PRODUCT_ID }
enum FacilitySortKey { FACILITY_NAME FACILITY_ID }
enum PartySortKey { PARTY_ID LAST_NAME }

"Computed fulfillment rollup for an order item (decision 12; service-backed)."
enum FulfillmentStatus { PROCESSING PARTIALLY_COMPLETED COMPLETED CANCELLED RETURNED PARTIALLY_REFUNDED } # NOT YET IMPLEMENTED — design contract

# =============================================================================
# Order graph
# =============================================================================
type OrderConnection { edges: [OrderEdge!]!  pageInfo: PageInfo! }
type OrderEdge { cursor: String!  node: Order! }

type Order {
  orderId: ID!
  orderName: String
  externalId: String
  statusId: ID!
  orderDate: DateTime
  grandTotal: Decimal
  currencyUomId: ID
  productStoreId: ID
  salesChannelEnumId: ID # not yet implemented (design surface)
  customerPartyId: ID # not yet implemented (design surface)
  "BILL_TO customer leaf object (view-backed); client composes the display name from firstName + lastName."
  billToCustomer: BillToCustomer
  "Number of distinct Shopify order lines (exploded OMS items from one Shopify line share OrderItem.externalId, so this is COUNT(DISTINCT externalId)). Resolved as a lazy LATERAL aggregate added to the order query only when selected; not filterable/sortable. 0 for orders with no/no-Shopify items."
  orderItemCount: Int
  billingAddress: PostalAddress
  # connections (paginable)
  orderItems(first: Int, after: String, last: Int, before: String): OrderItemConnection! @cost(weight: 2)
  shipGroups(first: Int, after: String, last: Int, before: String): ShipGroupConnection! @cost(weight: 2)
  returns(first: Int, after: String, last: Int, before: String): ReturnConnection!
  # plain bounded metadata lists
  identifications(first: Int = 10): [OrderIdentification!]!
  statuses(first: Int = 50): [OrderStatus!]!
  adjustments(first: Int = 50): [OrderAdjustment!]!
  paymentPreferences(first: Int = 20): [OrderPaymentPreference!]!
}

type BillToCustomer { partyId: ID!  firstName: String  lastName: String }

type OrderItemConnection { edges: [OrderItemEdge!]!  pageInfo: PageInfo! }
type OrderItemEdge { cursor: String!  node: OrderItem! }
type OrderItem {
  orderId: ID!
  orderItemSeqId: ID!
  productId: ID
  quantity: Int
  unitPrice: Decimal
  statusId: ID
  shipGroupSeqId: ID
  promisedDate: DateTime
  estimatedDeliveryDate: DateTime
  returnTillDate: DateTime
  "Service-backed computed fulfillment rollup (decision 12)."
  fulfillmentStatus: FulfillmentStatus @service(name: "get#ItemFulfillmentStatus") @cost(weight: 25) # NOT YET IMPLEMENTED — design contract
  adjustments(first: Int = 50): [OrderAdjustment!]!
}

type OrderIdentification { orderIdentificationTypeId: ID!  idValue: String! }
type OrderStatus { statusId: ID!  statusDatetime: DateTime  orderItemSeqId: ID }
type OrderAdjustment { orderAdjustmentId: ID!  orderAdjustmentTypeId: ID!  amount: Decimal  comments: String }
type OrderPaymentPreference { orderPaymentPreferenceId: ID!  paymentMethodTypeId: ID!  maxAmount: Decimal  statusId: ID }

type PostalAddress {
  contactMechId: ID  toName: String  address1: String  address2: String
  city: String  stateProvinceGeoId: ID  postalCode: String  countryGeoId: ID
}

type ShipGroupConnection { edges: [ShipGroupEdge!]!  pageInfo: PageInfo! }
type ShipGroupEdge { cursor: String!  node: ShipGroup! }
type ShipGroup {
  shipGroupSeqId: ID!  shipmentMethodTypeId: ID  carrierPartyId: ID  trackingCode: String
  facilityId: ID  contactMechId: ID  facility: Facility  picklistId: ID  picker: Person
  orderItems(first: Int, after: String, last: Int, before: String): OrderItemConnection!
}

type ReadyToPickOrderConnection { edges: [ReadyToPickOrderEdge!]!  pageInfo: PageInfo! }
type ReadyToPickOrderEdge { cursor: String!  node: ReadyToPickOrder! }
type ReadyToPickOrder { orderId: ID!  orderName: String  netsuiteOrderName: String  shipToStateProvinceGeoId: ID  facilityId: ID }

# =============================================================================
# Fulfillment — Shipment / Picklist
# =============================================================================
type ShipmentConnection { edges: [ShipmentEdge!]!  pageInfo: PageInfo! }
type ShipmentEdge { cursor: String!  node: Shipment! }
type Shipment {
  shipmentId: ID!  shipmentTypeId: ID  statusId: ID!  primaryOrderId: ID
  originFacilityId: ID  destinationFacilityId: ID  shipmentMethodTypeId: ID
  shippedDate: DateTime  estimatedShipDate: DateTime  externalId: String
  shipmentPackages(first: Int = 50): [ShipmentPackage!]!
  shipmentRouteSegments(first: Int = 10): [ShipmentRouteSegment!]!
}
type ShipmentPackage { shipmentPackageSeqId: ID!  trackingCode: String  labelImageUrl: String  shipmentPackageContents(first: Int = 100): [ShipmentPackageContent!]! }
type ShipmentPackageContent { productId: ID!  quantity: Int }
type ShipmentRouteSegment { carrierPartyId: ID  shipmentMethodTypeId: ID  trackingIdNumber: String  trackingUrl: String }

type Picklist {
  picklistId: ID!  statusId: ID!  picklistDate: DateTime  facilityId: ID
  picklistItems(first: Int, after: String, last: Int, before: String): PicklistItemConnection! @cost(weight: 3)
}
type PicklistItemConnection { edges: [PicklistItemEdge!]!  pageInfo: PageInfo! }
type PicklistItemEdge { cursor: String!  node: PicklistItem! }
type PicklistItem { orderId: ID  orderName: String  productId: ID  quantity: Int  itemStatusId: ID }

# =============================================================================
# Returns
# =============================================================================
type ReturnConnection { edges: [ReturnEdge!]!  pageInfo: PageInfo! }
type ReturnEdge { cursor: String!  node: Return! }
type Return {
  returnId: ID!  statusId: ID!  returnHeaderTypeId: ID  orderId: ID  fromPartyId: ID
  returnDate: DateTime  entryDate: DateTime  externalId: String  currencyUomId: ID
  identifications(first: Int = 5): [ReturnIdentification!]!
  returnItems(first: Int, after: String, last: Int, before: String): ReturnItemConnection!
}
type ReturnIdentification { returnIdentificationTypeId: ID!  idValue: String! }
type ReturnItemConnection { edges: [ReturnItemEdge!]!  pageInfo: PageInfo! }
type ReturnItemEdge { cursor: String!  node: ReturnItem! }
type ReturnItem { returnItemSeqId: ID!  orderId: ID  productId: ID  returnQuantity: Int  refundAmount: Decimal }

# =============================================================================
# Transfers & purchasing
# =============================================================================
type TransferOrderConnection { edges: [TransferOrderEdge!]!  pageInfo: PageInfo! }
type TransferOrderEdge { cursor: String!  node: TransferOrder! }
type TransferOrder {
  orderId: ID!  statusId: ID!  originFacilityId: ID  destinationFacilityId: ID
  orderItems(first: Int, after: String, last: Int, before: String): OrderItemConnection!
  shipments(first: Int, after: String, last: Int, before: String): ShipmentConnection!
}
type PurchaseOrder { orderId: ID!  statusId: ID  receipts(first: Int = 100): [ShipmentReceipt!]! }
type ShipmentReceipt { shipmentReceiptId: ID!  productId: ID  quantityAccepted: Decimal }

# =============================================================================
# Catalog
# =============================================================================
type ProductConnection { edges: [ProductEdge!]!  pageInfo: PageInfo! }
type ProductEdge { cursor: String!  node: Product! }
type Product {
  productId: ID!  productName: String  internalName: String  productTypeId: ID
  primaryProductCategoryId: ID  brandName: String  isVirtual: Boolean  isVariant: Boolean
  identifications(first: Int = 10): [GoodIdentification!]!     # bounded list
  variants(first: Int = 50): [Product!]!                       # bounded list
}
type GoodIdentification { goodIdentificationTypeId: ID!  idValue: String! }

# =============================================================================
# Facility & store
# =============================================================================
type FacilityConnection { edges: [FacilityEdge!]!  pageInfo: PageInfo! }
type FacilityEdge { cursor: String!  node: Facility! }
type Facility {
  facilityId: ID!  facilityName: String  facilityTypeId: ID  parentFacilityId: ID  externalId: String
  contactMechs(first: Int = 10): [FacilityContactMech!]!
  locations(first: Int = 50): [FacilityLocation!]!
  carriers(first: Int = 20): [Party!]!
  productStores(first: Int = 10): [ProductStore!]!
}
type FacilityContactMech { contactMechPurposeTypeId: ID  postalAddress: PostalAddress }
type FacilityLocation { locationSeqId: ID!  areaId: String  aisleId: String }
type ProductStore { productStoreId: ID!  storeName: String  shipmentMethods(first: Int = 20): [ProductStoreShipmentMethod!]! }
type ProductStoreShipmentMethod { shipmentMethodTypeId: ID!  carrierPartyId: ID  isTrackingRequired: Boolean }

# =============================================================================
# Inventory / ATP (service-backed result types)
# =============================================================================
type InventoryCheck { available: Boolean!  atp: Decimal }
type AtpResult { atp: Decimal }
type InventoryLevel { productId: ID!  facilityId: ID  quantityOnHand: Decimal  availableToPromise: Decimal }

# =============================================================================
# Cycle count
# =============================================================================
type CycleCount {
  inventoryCountImportId: ID!  statusId: ID!  facilityId: ID
  items(first: Int, after: String, last: Int, before: String): CycleCountItemConnection! @cost(weight: 3)
}
type CycleCountItemConnection { edges: [CycleCountItemEdge!]!  pageInfo: PageInfo! }
type CycleCountItemEdge { cursor: String!  node: CycleCountItem! }
type CycleCountItem { locationSeqId: ID  productId: ID  quantity: Decimal  varianceQuantityOnHand: Decimal }

# =============================================================================
# Order routing
# =============================================================================
type OrderRoutingGroup {
  routingGroupId: ID!  statusId: ID
  routings(first: Int = 20): [OrderRouting!]!
  runs(first: Int = 10): [OrderRoutingRun!]!
}
type OrderRouting { orderRoutingId: ID!  rules(first: Int = 50): [OrderRoutingRule!]! }
type OrderRoutingRule { fieldName: String  operatorEnumId: ID  fieldValue: String }
type OrderRoutingRun { routingRunId: ID!  runStartTime: DateTime  orderCount: Int }

# =============================================================================
# Party / customer
# =============================================================================
type PartyConnection { edges: [PartyEdge!]!  pageInfo: PageInfo! }
type PartyEdge { cursor: String!  node: Party! }
type Party {
  partyId: ID!  partyTypeEnumId: ID  partyTypeId: ID  roleTypeId: ID  statusId: ID
  externalId: String  firstName: String  lastName: String  emailAddress: String
  "Service-backed convenience: number of orders placed by this party."
  orderCount: Int @service(name: "get#PartyOrderCount") @cost(weight: 25)
}
type Person { partyId: ID  firstName: String  lastName: String }
